<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Register</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      background: #0d0d0d;
      color: white;
    }

    /* LEFT SIDE */
    .left {
      flex: 1;
      background: linear-gradient(135deg, #00c853, #ff4da6);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px;
      color: black;
    }

    .left h1 {
      font-size: 38px;
      margin-bottom: 10px;
    }

    .left p {
      max-width: 420px;
      line-height: 1.6;
      font-weight: 500;
    }

    /* RIGHT SIDE */
    .right {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0d0d0d;
    }

    .form-box {
      width: 360px;
      background: #151515;
      padding: 30px;
      border-radius: 14px;
      border: 1px solid #2a2a2a;
      box-shadow: 0 0 30px rgba(0,0,0,0.6);
    }

    .form-box h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #ff4da6;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #333;
      border-radius: 8px;
      background: #0d0d0d;
      color: white;
      outline: none;
    }

    input:focus {
      border-color: #00c853;
      box-shadow: 0 0 8px rgba(0, 200, 83, 0.4);
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(90deg, #00c853, #ff4da6);
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.03);
      opacity: 0.9;
    }

    a {
      display: block;
      margin-top: 15px;
      text-align: center;
      color: #aaa;
      text-decoration: none;
      font-size: 14px;
    }

    a:hover {
      color: #ff4da6;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      body {
        flex-direction: column;
      }

      .left {
        display: none;
      }

      .right {
        height: 100vh;
      }
    }
  </style>
</head>

<body>

  <div class="left">
    <h1>Student Portal 🎓</h1>
    <p>
      Create your account to check results, track performance,
      and stay updated with your academic progress.
    </p>
  </div>

  <div class="right">
    <div class="form-box">
      <h2>Student Registration</h2>

      <form action="/register" method="POST">
        <input type="text" name="username" placeholder="Username" required />
        <input type="password" name="password" placeholder="Password" required />
        <button type="submit">Register</button>
      </form>

      <a href="login.html">Already have an account? Login</a>
    </div>
  </div>

</body>

</html>
