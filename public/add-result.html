<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Results</title>
</head>
<body>
    <h2>Upload Student Result</h2>

<form
  action="/upload-results"
  method="POST"
  enctype="multipart/form-data"
>

<input 
      type="file" 
      name="excelFile" 
      accept=".xlsx,.xls"
      required
    />

  <button type="submit">
    Upload Results
  </button>
</form>
<a href="/dashboard">Back</a>

</body>
</html>
